name: Jobs CI

on: [push]

jobs:
  writer-unit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (Front)
        run: npm install
        working-directory: wm-rajar-ms_writer/FRONT

      - name: Run ESLint
        run: npm run lint
        working-directory: wm-rajar-ms_writer/FRONT

      - name: Run Front unit tests
        run: npm run test
        working-directory: wm-rajar-ms_writer/FRONT
      
      - name: Install dependencies (Back)
        run: npm install
        working-directory: wm-rajar-ms_writer/BACK

      - name: Run Back unit tests
        run: npm run test:unit
        working-directory: wm-rajar-ms_writer/BACK

  writer-integration:
    needs: writer-unit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies (Back)
        run: npm install
        working-directory: wm-rajar-ms_writer/BACK 

      - name: Create .env.test file
        run: |
          cat <<EOF > wm-rajar-ms_writer/BACK/.env.test
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_NAME=${{ secrets.DB_NAME }}
          EOF 
      
      - name: Docker compose
        run: docker compose -f docker-compose.test.yml up -d
      
      - name: Check docker service
        run: |
          until curl -s -f http://localhost:3010/health; do
            sleep 1
          done
      
      - name: Run Back integration tests
        run: npm run test:inte
        working-directory: wm-rajar-ms_writer/BACK

      - name: Stop Docker containers
        if: always()
        run: docker-compose -f docker-compose.test.yml down -v